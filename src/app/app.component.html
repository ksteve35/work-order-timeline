<div class="page-content">
  <div class="naologic-logo-container">
    <img src="/images/NaologicLogo.png" alt="Naologic Logo" class="naologic-logo" />
  </div>
  <div class="timeline-container">
    <div class="timeline-header">
      <div class="page-title">Work Orders</div>
      <div class="timeline-header-controls">
        <app-timescale-selector
          [selected]="selectedTimescale"
          (selectedChange)="onTimescaleSelected($event)"
        />
        <button class="today-btn" type="button" (click)="timeline.scrollToToday()">Today</button>
      </div>
    </div>
    <app-timeline
      #timeline
      [selectedTimescale]="selectedTimescale"
      [workCenters]="workCenters"
      [workOrders]="workOrders"
      (workOrdersChanged)="onWorkOrdersChanged($event)"
    />
  </div>
</div>
