<div class="page-content">
  <!-- Logo -->
  <div class="naologic-logo-container">
    <img src="/images/NaologicLogo.png" alt="Naologic Logo" class="naologic-logo" />
  </div>
  <div class="timeline-container">
    <!-- Page header and timescale selector -->
    <div class="timeline-header">
      <div class="page-title">Work Orders</div>
      <div class="timescale-selector">
        <div class="timescale-selector-both">
          <div class="timescale-selector-left">Timescale</div>
          <div class="timescale-selector-right">
            <ng-select
              class="timescale-ng-select"
              bindLabel="label"
              bindValue="value"
              appendTo=".timescale-selector-both"
              [(ngModel)]="selectedTimescale"
              [clearable]="false"
              [items]="timescaleOptions"
              [searchable]="false"
            ></ng-select>
          </div>
        </div>
      </div>
    </div>
    <!-- TIMELINE BODY -->
    <div class="timeline-body-wrapper">
      <!-- LEFT: work center labels -->
      <div class="left-column">
        <div class="work-center-header">Work Center</div>
        <div class="work-center-row" *ngFor="let wc of workCenters">
          {{ wc.data.name }}
        </div>
      </div>
      <!-- RIGHT: scrollable timeline -->
      <div class="right-column" #rightColumn>
        <!-- Wrapper gives position:relative context spanning header + all rows -->
        <div
          class="timeline-grid"
          [class.timeline-grid--week]="selectedTimescale === 'Week'"
          [style.width.px]="getTotalColumns() * columnWidth"
        >
          <!-- WEEK VIEW: two-row header -->
          <ng-container *ngIf="selectedTimescale === 'Week'">
            <div class="timeline-header-row timeline-header-row--week-top">
              <ng-container *ngFor="let group of getWeekGroups()">
                <div
                  class="timeline-cell timeline-cell--week-label"
                  [style.width.px]="group.days.length * columnWidth"
                >
                  {{ group.label }}
                </div>
              </ng-container>
            </div>
            <div
              class="timeline-header-row"
              [style.gridTemplateColumns]="'repeat(' + getTotalColumns() + ', ' + columnWidth + 'px)'"
            >
              <ng-container *ngFor="let group of getWeekGroups()">
                <div class="timeline-cell" *ngFor="let day of group.days">
                  {{ getDayLabel(day) }}
                </div>
              </ng-container>
            </div>
          </ng-container>
          <!-- HOUR / DAY / MONTH VIEW: single-row header -->
          <ng-container *ngIf="selectedTimescale !== 'Week'">
            <div
              class="timeline-header-row"
              [style.gridTemplateColumns]="'repeat(' + getTotalColumns() + ', ' + columnWidth + 'px)'"
            >
              <ng-container *ngIf="selectedTimescale === 'Hour'">
                <div class="timeline-cell" *ngFor="let col of getTimelineColumns()">
                  {{ getHourLabel(col) }}
                </div>
              </ng-container>
              <ng-container *ngIf="selectedTimescale === 'Day'">
                <div class="timeline-cell" *ngFor="let col of getTimelineColumns()">
                  {{ getDayLabel(col) }}
                </div>
              </ng-container>
              <ng-container *ngIf="selectedTimescale === 'Month'">
                <div class="timeline-cell" *ngFor="let col of getTimelineColumns()">
                  {{ getMonthLabel(col) }}
                </div>
              </ng-container>
            </div>
          </ng-container>
          <!-- Data rows: one per work center -->
          <div class="timeline-row" *ngFor="let wc of workCenters">
            <!--
              Background grid lines. Pointer-events:none so clicks pass through
              to the row itself for future create-panel functionality.
            -->
            <div
              class="timeline-cells-bg"
              [style.gridTemplateColumns]="'repeat(' + getTotalColumns() + ', ' + columnWidth + 'px)'"
            >
              <div class="timeline-cell" *ngFor="let col of getTimelineColumns()"></div>
            </div>
            <!-- Work order bars (absolutely positioned over the row) -->
            <ng-container *ngFor="let order of getOrdersForWorkCenter(wc.docId)">
              <div class="work-order-bar" [ngStyle]="getBarStyleObject(order)">
                <span class="bar-label">{{ order.data.name }}</span>
                <span class="bar-status" [ngStyle]="getStatusBadgeStyle(order.data.status)">
                  {{ getStatusLabel(order.data.status) }}
                </span>
              </div>
            </ng-container>
          </div>
          <!-- Current period indicator: spans full height of header + all rows -->
          <div class="current-period-indicator" [style.left.px]="getCurrentPeriodOffset()">
            <div class="current-period-label">{{ getCurrentPeriodLabel() }}</div>
            <div class="current-period-line"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
