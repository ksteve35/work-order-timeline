<div class="timeline-container">
  <div class="timeline-header">
    <div>Work Orders</div>
    <div class="header-right">
      <label>Timescale: </label>
      <select>
        <option>Day</option>
        <option>Week</option>
        <option>Month</option>
      </select>
    </div>
  </div>

  <div class="timeline-body">
    <!-- Left panel: Work Centers -->
    <div class="work-center-column">
      <div
        class="work-center-header"
      >
        Work Center
      </div>
      <div
        class="work-center-row"
        *ngFor="let wc of workCenters"
      >
        {{ wc.data.name }}
      </div>
    </div>

    <!-- Right panel: Timeline grid -->
    <div class="timeline-grid">
      <!-- Header row -->
      <div class="timeline-header-row">
        <div
          class="timeline-cell"
          *ngFor="let day of [].constructor(31); let i = index"
        >
          {{ 14 + i }}
        </div>
      </div>

      <!-- Timeline rows, one per work center -->
      <div
        class="timeline-row"
        *ngFor="let wc of workCenters"
      >
        <div
          class="timeline-cell"
          *ngFor="let day of [].constructor(31); let i = index"
        >
          <!-- Placeholder for future work order bars -->
        </div>
      </div>
    </div>
  </div>
</div>
