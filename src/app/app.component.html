<div class="timeline-container">
  <div class="timeline-header">
    <div>Work Orders</div>
    <div class="header-right">
      <label>Timescale: </label>
      <select>
        <option>Day</option>
        <option>Week</option>
        <option>Month</option>
      </select>
    </div>
  </div>

  <div class="timeline-body">
    <!-- Left panel: Work Centers -->
    <div class="work-center-column">
      <div class="work-center-header">
        Work Center
      </div>
      <div
        class="work-center-row"
        *ngFor="let wc of workCenters"
      >
        {{ wc.data.name }}
      </div>
    </div>

    <!-- Right panel: Timeline grid -->
    <div class="timeline-grid">
      <!-- Header row -->
      <div class="timeline-header-row">
        <div
          class="timeline-cell"
          *ngFor="let day of [].constructor(31); let i = index"
        >
          {{ 14 + i }}
        </div>
      </div>

      <!-- Timeline rows, one per work center -->
      <div
        class="timeline-row"
        *ngFor="let wc of workCenters"
        style="position: relative"
      >
        <!-- Timeline cells -->
        <div
          class="timeline-cell"
          *ngFor="let day of [].constructor(31)"
        ></div>

        <!-- Work order bars -->
        <div
          *ngFor="let order of getOrdersForWorkCenter(wc.docId)"
          class="work-order-bar"
          [style.left.px]="getBarStyle(order.data.startDate, order.data.endDate).left"
          [style.width.px]="getBarStyle(order.data.startDate, order.data.endDate).width"
          [style.background-color]="getStatusColor(order.data.status)"
        >
          {{ order.data.name }}
        </div>
      </div>
    </div>
  </div>
</div>
