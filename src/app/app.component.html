<div class="page-content">
  <!-- Logo -->
  <div class="naologic-logo-container">
    <img src="/images/NaologicLogo.png" alt="Naologic Logo" class="naologic-logo" />
  </div>
  <div class="timeline-container">
    <!-- Page header and timescale selector -->
    <div class="timeline-header">
      <div class="page-title">Work Orders</div>
      <div class="timescale-selector">
        <div class="timescale-selector-both">
          <div class="timescale-selector-left">Timescale</div>
          <div class="timescale-selector-right">
            <!--
              The active value is rendered as styled text + chevron rather than
              a native <select> so we can match the indigo color in the design.
              @upgrade: wire selectedTimescale to actual zoom logic
            -->
            <span class="timescale-value">Month</span>
            <svg class="timescale-chevron" width="10" height="6" viewBox="0 0 10 6" fill="none">
              <path d="M1 1L5 5L9 1" stroke="rgba(62, 64, 219, 1)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
      </div>
    </div>
    <!-- TIMELINE BODY -->
    <div class="timeline-body-wrapper">
      <!-- LEFT: work center labels -->
      <div class="left-column">
        <div class="work-center-header">Work Center</div>
        <div class="work-center-row" *ngFor="let wc of workCenters">
          {{ wc.data.name }}
        </div>
      </div>
      <!-- RIGHT: scrollable timeline -->
      <div class="right-column" #rightColumn>
        <!-- Wrapper gives position:relative context spanning header + all rows -->
        <div
          class="timeline-grid"
          [style.width.px]="getTimelineDays().length * columnWidth"
        >
          <!-- Header: one cell per day -->
          <div
            class="timeline-header-row"
            [style.gridTemplateColumns]="'repeat(' + getTimelineDays().length + ', ' + columnWidth + 'px)'"
          >
            <div class="timeline-cell" *ngFor="let day of getTimelineDays()">
              {{ day | date: 'MMM d' }}
            </div>
          </div>
          <!-- Data rows: one per work center -->
          <div
            class="timeline-row"
            *ngFor="let wc of workCenters"
          >
            <!--
              Background grid lines. Pointer-events:none so clicks pass through
              to the row itself for future create-panel functionality.
            -->
            <div
              class="timeline-cells-bg"
              [style.gridTemplateColumns]="'repeat(' + getTimelineDays().length + ', ' + columnWidth + 'px)'"
            >
              <div class="timeline-cell" *ngFor="let day of getTimelineDays()"></div>
            </div>
            <!-- Work order bars (absolutely positioned over the row) -->
            <ng-container *ngFor="let order of getOrdersForWorkCenter(wc.docId)">
              <div class="work-order-bar" [ngStyle]="getBarStyleObject(order)">
                <span class="bar-label">{{ order.data.name }}</span>
                <span class="bar-status" [ngStyle]="getStatusBadgeStyle(order.data.status)">
                  {{ getStatusLabel(order.data.status) }}
                </span>
              </div>
            </ng-container>
          </div>
          <!-- Current day indicator: spans full height of header + all rows -->
          <div class="current-day-indicator" [style.left.px]="getCurrentDayOffset()">
            <div class="current-day-label">{{ getCurrentDayLabel() }}</div>
            <div class="current-day-line"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
