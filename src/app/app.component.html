<div class="timeline-container">
  <div class="timeline-header">
    <div class="header-left">
      <h2>Work Orders</h2>
    </div>

    <div class="header-right">
      <label>Timescale: </label>
      <select>
        <option>Day</option>
        <option>Week</option>
        <option>Month</option>
      </select>
    </div>
  </div>

  <div class="timeline-body">
    <div class="work-center-column">
      <div class="work-center-header">
        Work Center
      </div>

      <div
        class="work-center-row"
        *ngFor="let center of workCenters"
      >
        {{ center.data.name }}
      </div>
    </div>

    <div class="timeline-grid">
      <div class="timeline-header-row">
        <div
          class="timeline-cell"
          *ngFor="let day of headerDays"
        >
          {{ day }}
        </div>
      </div>

      <div
        class="timeline-row"
        *ngFor="let center of workCenters"
      >
        <div
          class="timeline-cell"
          *ngFor="let day of headerDays"
        ></div>
      </div>
    </div>
  </div>
</div>
