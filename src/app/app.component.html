<div class="timeline-container">
  <div class="timeline-header">
    <div>Work Orders</div>
    <div class="header-right">
      <label>Timescale: </label>
      <select>
        <option>Day</option>
        <option>Week</option>
        <option>Month</option>
      </select>
    </div>
  </div>

  <div class="timeline-body">
    <!-- Left panel: Work Centers -->
    <div class="work-center-column">
      <div class="work-center-header">Work Center</div>
      <div class="work-center-row" *ngFor="let wc of workCenters">
        {{ wc.data.name }}
      </div>
    </div>

    <!-- Right panel: Timeline grid -->
    <div class="timeline-grid">
      <!-- Header row -->
      <div class="timeline-header-row">
        <div #timelineCell class="timeline-cell" *ngFor="let day of getTimelineDays()">
          {{ day }}
        </div>
      </div>

      <!-- Timeline rows -->
      <div class="timeline-row" *ngFor="let wc of workCenters">
        <div class="timeline-cell" *ngFor="let day of getTimelineDays()"></div>

        <ng-container *ngFor="let order of getOrdersForWorkCenter(wc.docId)">
          <div
            class="work-order-bar"
            [style.left.px]="getBarStyle(order.data.startDate, order.data.endDate).left"
            [style.width.px]="getBarStyle(order.data.startDate, order.data.endDate).width"
            [style.background-color]="getStatusColor(order.data.status)"
          >
            {{ order.data.name }}
          </div>
        </ng-container>
      </div>
    </div>
  </div>
</div>
