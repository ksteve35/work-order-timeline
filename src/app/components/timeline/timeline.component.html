<div class="timeline-body-wrapper" [class.timeline-body-wrapper--hidden]="!isReady">
  <div class="timeline-body-scroll">
  <div class="left-column">
    <div
      class="work-center-header"
      [class.work-center-header--double]="_activeTimescale !== 'Month'"
    >Work Center</div>
    <div class="work-center-row" *ngFor="let wc of workCenters; trackBy: trackByWcId">
      {{ wc.data.name }}
    </div>
  </div>

  <div class="right-column" #rightColumn>
    <div
      class="timeline-grid"
      [class.timeline-grid--week]="_activeTimescale === 'Week'"
      [class.timeline-grid--hour]="_activeTimescale === 'Hour'"
      [class.timeline-grid--day]="_activeTimescale === 'Day'"
      [style.width.px]="totalColumns * columnWidth"
      [ngStyle]="gridBackgroundStyle"
    >

      <!-- WEEK: two-row header -->
      <ng-container *ngIf="_activeTimescale === 'Week'">
        <div class="timeline-header-row timeline-header-row--week-top">
          <div
            class="timeline-cell timeline-cell--week-label"
            *ngFor="let group of weekGroups; trackBy: trackByIndex"
            [style.width.px]="group.days.length * columnWidth"
          >{{ group.label }}</div>
        </div>
        <div
          class="timeline-header-row"
          [style.gridTemplateColumns]="'repeat(' + totalColumns + ', ' + columnWidth + 'px)'"
        >
          <ng-container *ngFor="let group of weekGroups; trackBy: trackByIndex">
            <div class="timeline-cell" *ngFor="let day of group.days; trackBy: trackByDate">
              {{ getWeekDayLabel(day) }}
            </div>
          </ng-container>
        </div>
      </ng-container>

      <!-- DAY: two-row header -->
      <ng-container *ngIf="_activeTimescale === 'Day'">
        <div class="timeline-header-row timeline-header-row--week-top">
          <div
            class="timeline-cell timeline-cell--week-label"
            *ngFor="let group of monthGroups; trackBy: trackByIndex"
            [style.width.px]="group.days.length * columnWidth"
          >{{ group.label }}</div>
        </div>
        <div
          class="timeline-header-row"
          [style.gridTemplateColumns]="'repeat(' + totalColumns + ', ' + columnWidth + 'px)'"
        >
          <div class="timeline-cell" *ngFor="let col of timelineColumns; trackBy: trackByDate">
            {{ getDayLabel(col) }}
          </div>
        </div>
      </ng-container>

      <!-- HOUR: two-row header -->
      <ng-container *ngIf="_activeTimescale === 'Hour'">
        <div class="timeline-header-row timeline-header-row--week-top">
          <div
            class="timeline-cell timeline-cell--week-label"
            *ngFor="let group of dayGroups; trackBy: trackByIndex"
            [style.width.px]="group.hours.length * columnWidth"
          >{{ group.label }}</div>
        </div>
        <div
          class="timeline-header-row"
          [style.gridTemplateColumns]="'repeat(' + totalColumns + ', ' + columnWidth + 'px)'"
        >
          <div class="timeline-cell" *ngFor="let col of timelineColumns; trackBy: trackByDate">
            {{ getHourLabel(col) }}
          </div>
        </div>
      </ng-container>

      <!-- MONTH: single-row header -->
      <ng-container *ngIf="_activeTimescale === 'Month'">
        <div
          class="timeline-header-row"
          [style.gridTemplateColumns]="'repeat(' + totalColumns + ', ' + columnWidth + 'px)'"
        >
          <div class="timeline-cell" *ngFor="let col of timelineColumns; trackBy: trackByDate">
            {{ getMonthLabel(col) }}
          </div>
        </div>
      </ng-container>

      <!-- Data rows -->
      <div
        class="timeline-row"
        *ngFor="let wc of workCenters; trackBy: trackByWcId"
        (mousemove)="onRowMousemove($event, wc.docId)"
        (mouseleave)="onRowMouseleave()"
      >
        <!-- Hover ghost: empty slot preview shown over unoccupied columns -->
        <div
          class="timeline-row-ghost"
          *ngIf="hoverGhost && hoverGhost.wcId === wc.docId"
          [style.left.px]="hoverGhost.left"
          (click)="openCreatePanel(wc.docId, hoverGhost.left / columnWidth)"
        ></div>
        <app-work-order-bar
          *ngFor="let order of getOrdersForWorkCenter(wc.docId); trackBy: trackByOrderId"
          [order]="order"
          [barStyle]="getBarStyleObject(order)"
          (menuButtonClicked)="toggleOrderMenu(order.docId, $event)"
        />
      </div>

      <!-- Order context menu — rendered at grid level to escape bar stacking context -->
      <div
        class="bar-order-menu"
        *ngIf="openMenuOrderId !== null"
        [style.top.px]="orderMenuTop"
        [style.left.px]="orderMenuLeft"
        (click)="$event.stopPropagation()"
      >
        <div class="bar-order-menu-option" (click)="openEditPanel(getOrderById(openMenuOrderId!)); $event.stopPropagation()">Edit</div>
        <div class="bar-order-menu-option bar-order-menu-option--delete" (click)="onDeleteOrder(openMenuOrderId!, $event)">Delete</div>
      </div>

      <!-- Current period indicator -->
      <div class="current-period-indicator" [style.left.px]="getCurrentPeriodOffset()">
        <div class="current-period-label">{{ getCurrentPeriodLabel() }}</div>
        <div class="current-period-line"></div>
      </div>

    </div>
  </div>
  </div>
</div>

<!-- Work order panel (create / edit) -->
<app-work-order-panel
  *ngIf="panelMode !== null"
  [mode]="panelMode!"
  [initialData]="panelInitialData"
  [workCenters]="workCenters"
  [existingOrders]="workOrders"
  (save)="onPanelSave($event)"
  (cancel)="onPanelCancel()"
/>
