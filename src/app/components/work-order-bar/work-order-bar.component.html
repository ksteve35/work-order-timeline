<div class="work-order-bar" [ngStyle]="barStyle">
  <span class="bar-label">{{ order.data.name }}</span>
  <span class="bar-status" [ngStyle]="badgeStyle">
    {{ statusLabel }}
  </span>
  <button class="bar-menu-btn" type="button" (click)="onMenuButtonClick($event)">
    <svg width="14" height="4" viewBox="0 0 14 4" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="2"  cy="2" r="1.5" fill="rgba(104, 113, 150, 1)"/>
      <circle cx="7"  cy="2" r="1.5" fill="rgba(104, 113, 150, 1)"/>
      <circle cx="12" cy="2" r="1.5" fill="rgba(104, 113, 150, 1)"/>
    </svg>
  </button>
</div>
